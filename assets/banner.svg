<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="100%" height="3" fill="#29B5E8" rx="8"/>
  
  <!-- Pon Logo - matching the actual logo style -->
  <g transform="translate(40, 50)">
    <!-- p - rounded rectangle with descender -->
    <path d="M0,12 Q0,0 12,0 L28,0 Q40,0 40,12 L40,28 Q40,40 28,40 L12,40 L12,60 L0,60 L0,12 Z M12,10 L12,30 L28,30 Q30,30 30,28 L30,12 Q30,10 28,10 Z" fill="white"/>
    
    <!-- o - pill/rounded rectangle -->
    <path d="M55,12 Q55,0 67,0 L83,0 Q95,0 95,12 L95,28 Q95,40 83,40 L67,40 Q55,40 55,28 Z M67,10 L67,30 L83,30 Q85,30 85,28 L85,12 Q85,10 83,10 Z" fill="white"/>
    
    <!-- n - rounded top corners -->
    <path d="M110,40 L110,12 Q110,0 122,0 L138,0 Q150,0 150,12 L150,40 L138,40 L138,12 Q138,10 136,10 L124,10 Q122,10 122,12 L122,40 Z" fill="white"/>
    
    <!-- Underline - extends beyond text -->
    <rect x="-5" y="68" width="160" height="4" fill="white"/>
  </g>
  
  <!-- Vertical divider -->
  <rect x="220" y="40" width="2" height="100" fill="#29B5E8" opacity="0.4" rx="1"/>
  
  <!-- Main title section -->
  <g transform="translate(250, 0)">
    <text x="0" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">
      EV Transition Netherlands
    </text>
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="16" fill="#29B5E8">
      Hands-on Snowflake Data Engineering Lab
    </text>
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="13" fill="#8b949e">
      Dynamic Tables  •  Secure Data Sharing  •  Auto-Scaling Warehouses
    </text>
  </g>
  
  <!-- EV Car icon -->
  <g transform="translate(700, 60)">
    <rect x="0" y="30" width="80" height="25" rx="8" fill="#29B5E8"/>
    <rect x="10" y="20" width="55" height="15" rx="4" fill="#29B5E8"/>
    <rect x="18" y="23" width="18" height="9" rx="2" fill="#0d1117" opacity="0.6"/>
    <rect x="42" y="23" width="18" height="9" rx="2" fill="#0d1117" opacity="0.6"/>
    <circle cx="18" cy="55" r="10" fill="#0d1117"/>
    <circle cx="18" cy="55" r="5" fill="#FF6B00"/>
    <circle cx="62" cy="55" r="10" fill="#0d1117"/>
    <circle cx="62" cy="55" r="5" fill="#FF6B00"/>
    <!-- Charging bolt -->
    <polygon points="75,25 70,35 74,35 69,48 78,33 74,33" fill="#00ff88"/>
  </g>
  
  <!-- Snowflake logo -->
  <g transform="translate(850, 90)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#29B5E8" stroke-width="2"/>
    <line x1="-16" y1="-9" x2="16" y2="9" stroke="#29B5E8" stroke-width="2"/>
    <line x1="-16" y1="9" x2="16" y2="-9" stroke="#29B5E8" stroke-width="2"/>
    <circle cx="0" cy="-18" r="3" fill="#29B5E8"/>
    <circle cx="0" cy="18" r="3" fill="#29B5E8"/>
    <circle cx="-16" cy="-9" r="3" fill="#29B5E8"/>
    <circle cx="16" cy="9" r="3" fill="#29B5E8"/>
    <circle cx="-16" cy="9" r="3" fill="#29B5E8"/>
    <circle cx="16" cy="-9" r="3" fill="#29B5E8"/>
  </g>
</svg>
