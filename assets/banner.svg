<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29B5E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Accent bar top -->
  <rect x="0" y="0" width="100%" height="4" fill="url(#accentGrad)"/>
  
  <!-- Pon Logo (recreated) -->
  <g transform="translate(50, 70)">
    <!-- P -->
    <path d="M0,0 L0,50 L8,50 L8,30 L30,30 L30,22 C30,10 24,0 12,0 Z M8,8 L12,8 C18,8 22,12 22,18 L22,22 L8,22 Z" fill="white"/>
    <!-- O -->
    <path d="M40,0 C28,0 22,10 22,25 C22,40 28,50 40,50 L55,50 C67,50 73,40 73,25 C73,10 67,0 55,0 Z M40,8 L55,8 C61,8 65,14 65,25 C65,36 61,42 55,42 L40,42 C34,42 30,36 30,25 C30,14 34,8 40,8 Z" transform="translate(35,0)" fill="white"/>
    <!-- N -->
    <path d="M0,0 L0,50 L8,50 L8,15 L35,50 L43,50 L43,0 L35,0 L35,35 L8,0 Z" transform="translate(120,0)" fill="white"/>
    <!-- Underline -->
    <rect x="0" y="58" width="163" height="4" fill="white"/>
  </g>
  
  <!-- Divider line -->
  <line x1="240" y1="50" x2="240" y2="150" stroke="#29B5E8" stroke-width="2" opacity="0.5"/>
  
  <!-- Car silhouette (simplified EV) -->
  <g transform="translate(270, 75)">
    <!-- Body -->
    <path d="M0,45 L8,20 L50,10 L120,10 L145,20 L155,45 L155,60 L0,60 Z" 
          fill="#29B5E8" opacity="0.9"/>
    <!-- Windows -->
    <path d="M15,22 L48,12 L115,12 L138,22 L110,22 L55,22 Z" 
          fill="#1a1a2e" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="35" cy="60" r="14" fill="#1a1a2e"/>
    <circle cx="35" cy="60" r="8" fill="#FF6B00"/>
    <circle cx="125" cy="60" r="14" fill="#1a1a2e"/>
    <circle cx="125" cy="60" r="8" fill="#FF6B00"/>
    <!-- Charging indicator -->
    <rect x="132" y="28" width="6" height="10" rx="2" fill="#00ff88"/>
  </g>
  
  <!-- Title -->
  <text x="460" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">
    EV Transition Netherlands
  </text>
  <text x="460" y="115" font-family="Arial, sans-serif" font-size="18" fill="#29B5E8">
    Hands-on Snowflake Data Engineering Lab
  </text>
  <text x="460" y="145" font-family="Arial, sans-serif" font-size="14" fill="#888">
    Dynamic Tables • Secure Sharing • Auto-Scaling
  </text>
  
  <!-- Snowflake logo (simplified) -->
  <g transform="translate(840, 100)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#29B5E8" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#29B5E8" stroke-width="2.5"/>
    <line x1="-17" y1="-10" x2="17" y2="10" stroke="#29B5E8" stroke-width="2.5"/>
    <line x1="-17" y1="10" x2="17" y2="-10" stroke="#29B5E8" stroke-width="2.5"/>
    <circle cx="0" cy="-20" r="3" fill="#29B5E8"/>
    <circle cx="0" cy="20" r="3" fill="#29B5E8"/>
    <circle cx="-17" cy="-10" r="3" fill="#29B5E8"/>
    <circle cx="17" cy="10" r="3" fill="#29B5E8"/>
    <circle cx="-17" cy="10" r="3" fill="#29B5E8"/>
    <circle cx="17" cy="-10" r="3" fill="#29B5E8"/>
  </g>
</svg>
